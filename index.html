<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Engine Weekly Summary</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --link: #58a6ff;
    --green: #76b900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }
  .container {
    text-align: center;
    max-width: 600px;
  }
  .logo {
    font-size: 3em;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 1.8em;
    margin-bottom: 8px;
    color: var(--green);
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 1em;
    margin-bottom: 32px;
  }
  .loading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 0.9em;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .redirect-notice {
    margin-top: 16px;
    font-size: 0.85em;
    color: var(--text-muted);
  }
  .redirect-notice a {
    color: var(--link);
    text-decoration: none;
  }
  .redirect-notice a:hover {
    text-decoration: underline;
  }
  .recent-reports {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    width: 100%;
  }
  .recent-reports h2 {
    font-size: 1em;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .report-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .report-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }
  .report-item:hover {
    border-color: var(--green);
  }
  .report-item a {
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .report-item a:hover {
    color: var(--link);
  }
  .report-date {
    font-size: 0.85em;
    color: var(--text-muted);
  }
  .badge-latest {
    background: rgba(118,185,0,0.15);
    color: var(--green);
    border: 1px solid rgba(118,185,0,0.3);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75em;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">📊</div>
  <h1>Transformer Engine Weekly</h1>
  <div class="subtitle">GitHub Repository Weekly Tracking Report</div>
  
  <div class="loading">
    <div class="spinner"></div>
    <span>正在跳转到最新周报...</span>
  </div>
  
  <div class="redirect-notice">
    如果没有自动跳转，请 <a id="manual-link" href="#">点击这里</a>
  </div>

  <div class="recent-reports">
    <h2>近期周报</h2>
    <ul class="report-list" id="report-list">
      <!-- 报告列表将由 JavaScript 自动生成 -->
    </ul>
  </div>

<script>
(function() {
  // ==================== 配置区域 ====================
  // 只需列出文件名，日期和周数会自动计算
  // 格式: te-weekly-report-YYYY-MM-DD.html（DD为周日日期）
  const reportFiles = [
    'te-weekly-report-2026-04-12.html',
    'te-weekly-report-2026-04-05.html',
    'te-weekly-report-2026-03-30.html',
    'te-weekly-report-2026-03-22.html'
  ];
  // =================================================

  const summaryPath = './te-summary/';
  const reportList = document.getElementById('report-list');
  const manualLink = document.getElementById('manual-link');

  // 从文件名解析日期 (te-weekly-report-YYYY-MM-DD.html)
  function parseDateFromFilename(filename) {
    const match = filename.match(/te-weekly-report-(\d{4})-(\d{2})-(\d{2})\.html/);
    if (!match) return null;
    const [_, year, month, day] = match;
    return new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  }

  // 格式化日期范围 (周日往前推6天)
  function formatDateRange(endDate) {
    const startDate = new Date(endDate);
    startDate.setDate(startDate.getDate() - 6);
    
    const fmt = (d) => {
      const m = d.getMonth() + 1;
      const day = d.getDate();
      return `${m.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
    };
    
    const startYear = startDate.getFullYear();
    const endYear = endDate.getFullYear();
    
    if (startYear !== endYear) {
      return `${startYear}-${fmt(startDate)} ~ ${endYear}-${fmt(endDate)}`;
    }
    return `${startYear}-${fmt(startDate)} ~ ${fmt(endDate)}`;
  }

  // 计算周数 (ISO 8601 周数)
  function getWeekNumber(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }

  // 解析所有报告并排序（最新的在前）
  function parseReports() {
    const reports = reportFiles
      .map(file => {
        const date = parseDateFromFilename(file);
        if (!date) return null;
        return {
          file,
          date,
          dateStr: formatDateRange(date),
          week: getWeekNumber(date)
        };
      })
      .filter(r => r !== null)
      .sort((a, b) => b.date - a.date); // 降序排列
    
    return reports;
  }

  // 获取相对时间描述
  function getRelativeTime(reportDate, now) {
    const diffMs = now - reportDate;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    
    if (diffDays <= 0) return '今天';
    if (diffDays === 1) return '昨天';
    if (diffDays < 7) return `${diffDays} 天前`;
    if (diffDays < 14) return '1 周前';
    const weeks = Math.floor(diffDays / 7);
    return `${weeks} 周前`;
  }

  // 生成报告列表
  function generateReportList(reports) {
    reportList.innerHTML = '';
    const now = new Date();
    
    reports.forEach((report, index) => {
      const li = document.createElement('li');
      li.className = 'report-item';
      
      const isLatest = index === 0;
      const badge = isLatest 
        ? '<span class="badge-latest">最新</span>'
        : `<span class="report-date">${getRelativeTime(report.date, now)}</span>`;
      
      li.innerHTML = `
        <a href="${summaryPath}${report.file}">
          <span>${report.dateStr} (W${report.week})</span>
          ${badge}
        </a>
      `;
      
      reportList.appendChild(li);
    });
  }

  // 自动跳转到最新报告
  function autoRedirect(reports) {
    if (reports.length > 0) {
      const latest = reports[0];
      manualLink.href = summaryPath + latest.file;
      
      // 延迟跳转，让用户看到主页
      setTimeout(() => {
        window.location.href = summaryPath + latest.file;
      }, 1500);
    }
  }

  // 初始化
  const reports = parseReports();
  generateReportList(reports);
  autoRedirect(reports);
})();
</script>
</div>

</body>
</html>
