<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=./te-summary/te-weekly-report-2026-03-23-30.html">
<title>Transformer Engine Weekly Summary</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --link: #58a6ff;
    --green: #76b900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }
  .container {
    text-align: center;
    max-width: 600px;
  }
  .logo {
    font-size: 3em;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 1.8em;
    margin-bottom: 8px;
    color: var(--green);
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 1em;
    margin-bottom: 32px;
  }
  .loading {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 0.9em;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .redirect-notice {
    margin-top: 16px;
    font-size: 0.85em;
    color: var(--text-muted);
  }
  .redirect-notice a {
    color: var(--link);
    text-decoration: none;
  }
  .redirect-notice a:hover {
    text-decoration: underline;
  }
  .recent-reports {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    width: 100%;
  }
  .recent-reports h2 {
    font-size: 1em;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .report-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .report-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    transition: border-color 0.2s;
  }
  .report-item:hover {
    border-color: var(--green);
  }
  .report-item a {
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .report-item a:hover {
    color: var(--link);
  }
  .report-date {
    font-size: 0.85em;
    color: var(--text-muted);
  }
  .badge-latest {
    background: rgba(118,185,0,0.15);
    color: var(--green);
    border: 1px solid rgba(118,185,0,0.3);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75em;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">📊</div>
  <h1>Transformer Engine Weekly</h1>
  <div class="subtitle">GitHub Repository Weekly Tracking Report</div>
  
  <div class="loading">
    <div class="spinner"></div>
    <span>正在跳转到最新周报...</span>
  </div>
  
  <div class="redirect-notice">
    如果没有自动跳转，请 <a href="./te-summary/te-weekly-report-2026-03-23-30.html">点击这里</a>
  </div>

  <div class="recent-reports">
    <h2>近期周报</h2>
    <ul class="report-list">
      <li class="report-item">
        <a href="./te-summary/te-weekly-report-2026-03-23-30.html">
          <span>2026-03-23 ~ 03-29 (W13)</span>
          <span class="badge-latest">最新</span>
        </a>
      </li>
      <li class="report-item">
        <a href="./te-summary/te-weekly-report-2026-03-16-22.html">
          <span>2026-03-16 ~ 03-22 (W12)</span>
          <span class="report-date">2 周前</span>
        </a>
      </li>
    </ul>
  </div>
</div>

</body>
</html>
